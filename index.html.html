<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Study Hub - Official App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2ecc71">
    
    <style>
        :root { --bg: #0b141a; --panel: #111b21; --accent: #2ecc71; --text: #e9edef; --border: #222e35; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; 
            display: grid; grid-template-columns: 280px 1fr 450px; 
            height: 100vh; overflow: hidden; 
        }

        /* SIDEBAR CON IL TUO LOGO */
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        
        .logo-box {
            text-align: center; padding: 20px; 
            background: linear-gradient(145deg, #162127, #0b141a);
            border-radius: 25px; border: 1px solid var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .app-logo-img { 
            width: 130px; height: 130px; 
            border-radius: 20px; object-fit: cover;
            border: 2px solid var(--accent);
        }

        .settings-container { background: #202c33; border-radius: 15px; padding: 15px; border: 1px solid var(--border); }
        .pref-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 12px; }

        /* TRADUTTORE */
        .trans-vignette { background: #111b21; border: 2px solid var(--accent); border-radius: 15px; padding: 15px; }
        .trans-input, .trans-select { width: 100%; background: #2a3942; border: none; padding: 10px; border-radius: 8px; color: white; margin-bottom: 8px; font-size: 13px; outline: none; }
        .trans-btn { width: 100%; background: var(--accent); border: none; color: #0b141a; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }

        /* CHAT */
        .main-chat { display: flex; flex-direction: column; background: var(--bg); }
        #chat-display { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 15px; font-size: 14px; max-width: 85%; }
        .bot { background: #202c33; align-self: flex-start; border-left: 4px solid var(--accent); }
        .tu { background: #005c4b; align-self: flex-end; }
        .input-area { padding: 15px; background: #202c33; display: flex; gap: 10px; }
        input#user-in { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #2a3942; color: white; outline: none; }

        /* LAVAGNA (Destra) */
        .right-panel { background: #1a1a1a; display: flex; flex-direction: column; }
        .view-tabs { display: flex; background: #202c33; padding: 8px; gap: 8px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #2a3942; color: #8696a0; border-radius: 8px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: #0b141a; }
        #board-view { background: #ffffff; color: #1a1a1a; padding: 25px; overflow-y: auto; height: 100%; }
        #wiki-view { width: 100%; height: 100%; border: none; display: none; }
        .history-item { border-bottom: 1px solid #eee; padding: 12px 0; animation: slideDown 0.4s; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* SWITCH UI */
        .switch { position: relative; width: 34px; height: 18px; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #555; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }

        @media (max-width: 1024px) { body { grid-template-columns: 1fr; } .sidebar, .right-panel { display: none; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-box">
            <img src="logo.png.jpg" class="app-logo-img" alt="Logo Ufficiale">
            <h2 style="color:var(--accent); font-size:18px; margin-top:15px; letter-spacing:1px;">STUDY HUB AI</h2>
        </div>

        <div class="settings-container">
            <div class="pref-item"><span>Sintesi Vocale</span><label class="switch"><input type="checkbox" id="pref-voice" onchange="savePrefs()"><span class="slider"></span></label></div>
            <div class="pref-item"><span>Dark Wikipedia</span><label class="switch"><input type="checkbox" id="pref-dark" onchange="savePrefs()"><span class="slider"></span></label></div>
        </div>

        <div class="trans-vignette">
            <input type="text" id="trans-text" class="trans-input" placeholder="Parola o frase...">
            <select id="trans-lang" class="trans-select">
                <option value="en">Inglese 🇬🇧</option>
                <option value="la">Latino 🏛️</option>
                <option value="es">Spagnolo 🇪🇸</option>
                <option value="de">Tedesco 🇩🇪</option>
            </select>
            <button class="trans-btn" onclick="traduciSuLavagna()">TRADUCI & SALVA</button>
        </div>
    </div>

    <div class="main-chat">
        <div id="chat-display"></div>
        <div class="input-area">
            <input type="text" id="user-in" placeholder="Chiedi o calcola..." autocomplete="off">
            <button onclick="invia()" style="background: var(--accent); border:none; color:#0b141a; padding:12px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">OK</button>
        </div>
    </div>

    <div class="right-panel">
        <div class="view-tabs">
            <button class="tab-btn active" id="btn-board" onclick="showView('board')">📝 LAVAGNA</button>
            <button class="tab-btn" id="btn-wiki" onclick="showView('wiki')">🌐 WIKIPEDIA</button>
        </div>
        <div id="board-view"><div id="history-container"></div></div>
        <iframe id="wiki-view" src="https://it.m.wikipedia.org/wiki/Pagina_principale"></iframe>
    </div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    const chat = document.getElementById("chat-display");
    const input = document.getElementById("user-in");
    const historyCont = document.getElementById("history-container");
    const wiki = document.getElementById("wiki-view");

    function savePrefs() {
        localStorage.setItem('hub_voice', document.getElementById('pref-voice').checked);
        localStorage.setItem('hub_dark', document.getElementById('pref-dark').checked);
        applyPrefs();
    }

    function applyPrefs() {
        const dark = localStorage.getItem('hub_dark') === 'true';
        wiki.style.filter = dark ? "invert(1) hue-rotate(180deg)" : "none";
        document.getElementById('pref-dark').checked = dark;
        document.getElementById('pref-voice').checked = localStorage.getItem('hub_voice') === 'true';
    }

    function showView(type) {
        document.getElementById('board-view').style.display = type === 'board' ? 'block' : 'none';
        document.getElementById('wiki-view').style.display = type === 'wiki' ? 'block' : 'none';
        document.getElementById('btn-board').classList.toggle('active', type === 'board');
        document.getElementById('btn-wiki').classList.toggle('active', type === 'wiki');
    }

    async function traduciSuLavagna() {
        const text = document.getElementById("trans-text").value.trim();
        const lang = document.getElementById("trans-lang").value;
        if(!text) return;
        try {
            const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=it|${lang}`);
            const data = await resp.json();
            const res = data.responseData.translatedText;
            addHistory('TRADUZIONE', `${text} (${lang})`, res);
            showView('board');
            document.getElementById("trans-text").value = "";
        } catch(e) { alert("Errore traduzione"); }
    }

    function addHistory(type, sub, main) {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerHTML = `<small style="color:var(--accent); font-weight:bold;">${type}</small><br><small>${sub}</small><br><span style="font-size:20px; font-weight:bold;">${main}</span>`;
        historyCont.prepend(div);
    }

    function print(who, txt) {
        const d = document.createElement("div");
        d.className = "msg " + (who === "Bot" ? "bot" : "tu");
        d.innerHTML = `<b>${who}:</b> ${txt}`;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        if(who === "Bot" && localStorage.getItem('hub_voice') === 'true') {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(txt.replace(/<[^>]*>?/gm, ''));
            m.lang = 'it-IT'; window.speechSynthesis.speak(m);
        }
    }

    function invia() {
        const val = input.value.trim();
        if(!val) return;
        print("Tu", val);
        input.value = "";
        if (/^[0-9+\-*/().\s^%]+$/.test(val)) {
            try {
                let res = eval(val.replace(/(\d+)%/g, "($1/100)").replace("^", "**"));
                addHistory('CALCOLO', val, res);
                print("Bot", `Risultato: ${res}`);
                showView('board');
            } catch(e) { print("Bot", "Errore matematico."); }
        } else {
            wiki.src = `https://it.m.wikipedia.org/wiki/${encodeURIComponent(val)}`;
            showView('wiki');
            print("Bot", `Cercando ${val} su Wikipedia...`);
        }
    }

    window.onload = applyPrefs;
    input.addEventListener("keypress", (e) => { if(e.key==='Enter') invia(); });
</script>
</body>
</html>
